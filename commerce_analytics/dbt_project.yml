name: 'commerce_analytics'
version: '1.0.0'
profile: 'commerce_analytics'

# File paths
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Model configurations per layer
models:
  commerce_analytics:

    # STAGING LAYER
    # Views are cheap — no storage cost, always fresh
    staging:
      +materialized: view
      +schema: staging

    # INTERMEDIATE LAYER  
    # Ephemeral — not stored in Snowflake, used as CTEs by other models
    intermediate:
      +materialized: ephemeral

    # MARTS LAYER
    marts:
      core:
        # Tables — stored permanently, fast for BI tools to query
        +materialized: table
        +schema: marts

      reporting:
        # Tables — final business reports
        +materialized: table
        +schema: reporting
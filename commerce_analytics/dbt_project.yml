name: 'commerce_analytics'
version: '1.0.0'
profile: 'commerce_analytics'

# File paths
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Model configurations per layer
models:
  commerce_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      core:
        +materialized: table
        +schema: marts
      reporting:
        +materialized: table
        +schema: reporting

# Seed configurations
seeds:
  commerce_analytics:
    +schema: raw
    +column_types:
      region_key: integer
      nation_key: integer
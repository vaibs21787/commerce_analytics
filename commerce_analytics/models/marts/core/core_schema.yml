version: 2

models:
  - name: dim_customers
    description: "Customer dimension. One row per customer with geography and balance segment."
    columns:
      - name: customer_key
        description: "Primary key - unique customer identifier"
        tests:
          - unique
          - not_null

      - name: customer_name
        description: "Customer name"
        tests:
          - not_null

      - name: market_segment
        description: "Customer market segment"
        tests:
          - not_null
          - accepted_values:
              values: ['AUTOMOBILE', 'BUILDING',
                       'FURNITURE', 'MACHINERY', 'HOUSEHOLD']

      - name: nation_name
        description: "Country name"
        tests:
          - not_null

      - name: region_name
        description: "Region name"
        tests:
          - not_null

      - name: balance_segment
        description: "Account balance category"
        tests:
          - not_null
          - accepted_values:
              values: ['Negative', 'Zero', 'Low', 'Medium', 'High']

  - name: dim_parts
    description: "Parts dimension. One row per part with type parsing and price segment."
    columns:
      - name: part_key
        description: "Primary key - unique part identifier"
        tests:
          - unique
          - not_null

      - name: manufacturer
        description: "Part manufacturer"
        tests:
          - not_null

      - name: retail_price
        description: "Retail price of the part"
        tests:
          - not_null

      - name: price_segment
        description: "Price category"
        tests:
          - not_null
          - accepted_values:
              values: ['Budget', 'Standard', 'Premium', 'Luxury']

  - name: dim_suppliers
    description: "Supplier dimension. One row per supplier with geography."
    columns:
      - name: supplier_key
        description: "Primary key - unique supplier identifier"
        tests:
          - unique
          - not_null

      - name: supplier_name
        description: "Supplier name"
        tests:
          - not_null

      - name: nation_name
        description: "Country name"
        tests:
          - not_null

      - name: balance_segment
        description: "Account balance category"
        tests:
          - not_null
          - accepted_values:
              values: ['Negative', 'Zero', 'Low', 'Medium', 'High']

  - name: fct_orders
    description: "Order fact table. One row per order."
    columns:
      - name: order_key
        description: "Primary key - unique order identifier"
        tests:
          - unique
          - not_null

      - name: customer_key
        description: "Foreign key to dim_customers"
        tests:
          - not_null

      - name: order_date
        description: "Date order was placed"
        tests:
          - not_null

      - name: status_code
        description: "Order status"
        tests:
          - not_null
          - accepted_values:
              values: ['F', 'O', 'P']

      - name: total_price
        description: "Total order price"
        tests:
          - not_null

  - name: fct_order_items
    description: "Line item fact table. One row per line item."
    columns:
      - name: order_key
        description: "Part of composite primary key"
        tests:
          - not_null

      - name: line_number
        description: "Part of composite primary key"
        tests:
          - not_null

      - name: net_revenue
        description: "Revenue after discount"
        tests:
          - not_null

      - name: is_late_delivery
        description: "Flag for late deliveries"
        tests:
          - not_null

      - name: is_returned
        description: "Flag for returned items"
        tests:
          - not_null